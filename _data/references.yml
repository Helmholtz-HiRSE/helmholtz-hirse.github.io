  title: 'A cast of thousands: How the IDEAS Productivity project has advanced software
    productivity and sustainability'
  year: 2023
  doi: 10.48550/ARXIV.2311.02010
  abstract: Computational and data-enabled science and engineering are revolutionizing
    advances throughout science and society, at all scales of computing. For example,
    teams in the U.S. DOE Exascale Computing Project have been tackling new frontiers
    in modeling, simulation, and analysis by exploiting unprecedented exascale computing
    capabilities-building an advanced software ecosystem that supports next-generation
    applications and addresses disruptive changes in computer architectures. However,
    concerns are growing about the productivity of the developers of scientific software,
    its sustainability, and the trustworthiness of the results that it produces. Members
    of the IDEAS project serve as catalysts to address these challenges through fostering
    software communities, incubating and curating methodologies and resources, and
    disseminating knowledge to advance developer productivity and software sustainability.
    This paper discusses how these synergistic activities are advancing scientific
    discovery-mitigating technical risks by building a firmer foundation for reproducible,
    sustainable science at all scales of computing, from laptops to clusters to exascale
    and beyond.
