  - Carlos Martinez Ortiz
  - Rob van Nieuwpoort
  - Slinger Jansen
  title: 'RSMM: A Framework to Assess Maturity of Research Software Project'
  year: 2024
  abstract: 'The organizations and researchers producing research software face a
    common problem of making their software sustainable beyond funding provided by
    a single research project. This is addressed by research software engineers through
    building communities around their software, providing appropriate licensing, creating
    reliable and reproducible research software, making it sustainable and impactful,
    promoting, and ensuring that the research software is easy to adopt in research
    workflows, etc. As a result, numerous practices and guidelines exist to enhance
    research software quality, reusability, and sustainability. However, there is
    a lack of a unified framework to systematically integrate these practices and
    help organizations and research software developers refine their development and
    management processes. Our paper aims at bridging this gap by introducing a novel
    framework: RSMM. It is designed through systematic literature review and insights
    from interviews with research software project experts. In short, RSMM offers
    a structured pathway for evaluating and refining research software project management
    by categorizing 79 best practices into 17 capabilities across 4 focus areas. From
    assessing code quality and security to measuring impact, sustainability, and reproducibility,
    the model provides a complete evaluation of a research software project maturity.
    With RSMM, individuals as well as organizations involved in research software
    development gain a systematic approach to tackling various research software engineering
    challenges. By utilizing RSMM as a comprehensive checklist, organizations can
    systematically evaluate and refine their project management practices and organizational
    structure.'
