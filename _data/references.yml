- id: milewicz_secure_2022
  type: article
  authors:
  - Reed Milewicz
  - Jeffrey Carver
  - Samuel Grayson
  - Travis Atkison
  title: A Secure Future for Open-Source Computational Science and Engineering
  year: 2022
  doi: 10.48550/ARXIV.2211.06343
  abstract: Journalists, public policy analysts, and economists have called attention
    to the growing importance that high-performance and scientific computing have
    to national security and industrial leadership. As computing continues to power
    scientific advances in virtually every discipline, so too does it improve our
    economic productivity and quality of life. The increasing social, political, and
    economic importance of research software, however, has also brought the question
    of software security to the fore. Just as unintentional software errors can threaten
    the integrity of scientific studies, malicious actors could leverage vulnerabilities
    to alter results, exfiltrate data, and sabotage computing resources. In this editorial,
    the authors argue for the need to incorporate security practices and perspectives
    throughout the research software lifecycle, and they propose directions for future
    work in this space.
- id: mischke_automated_2022
  type: article
  authors:
  - Robert Mischke
  - Kathrin Schaffert
  - Dominik Schneider
  - Alexander Weinert
  title: Automated and manual testing as part of the research software development
    process of RCE
  year: 2022
  abstract: Research software is often developed by individual researchers or small
    teams in parallel to their research work. The more people and research projects
    rely on the software in question, the more important it is that software updates
    implement new features correctly and do not introduce regressions. Thus, developers
    of research software must balance their limited resources between implementing
    new features and thoroughly testing any code changes. We present the processes
    we use for developing the distributed integration framework RCE at DLR. These
    processes aim to strike a balance between automation and manual testing, reducing
    the testing overhead while addressing issues as early as possible. We furthermore
    briefly describe how these testing processes integrate with the surrounding processes
    for development and releasing.
