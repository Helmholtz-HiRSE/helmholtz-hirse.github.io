  title: 'The FAIR guiding principles for data stewardship: fair enough?'
  year: 2018
  journal: European Journal of Human Genetics
  volume: '26'
  number: '7'
  pages: 931--936
  doi: 10.1038/s41431-018-0160-0
  url: https://www.nature.com/articles/s41431-018-0160-0
  abstract: The FAIR guiding principles for research data stewardship (findability,
    accessibility, interoperability, and reusability) look set to become a cornerstone
    of research in the life sciences. A critical appraisal of these principles in
    light of ongoing discussions and developments about data sharing is in order.
    The FAIR principles point the way forward for facilitating data sharing more systematically--provided
    that a number of ethical, methodological, and organisational challenges are addressed
    as well.
