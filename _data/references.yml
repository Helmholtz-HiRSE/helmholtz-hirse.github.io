- id: pan_disciplinary_2016
  type: article
  authors:
  - Xuelian Pan
  - Erjia Yan
  - Weina Hua
  title: Disciplinary differences of software use and impact in scientific literature
  year: 2016
  journal: Scientometrics
  volume: '109'
  number: '3'
  pages: 1593--1610
  doi: 10/f9fp4p
  url: https://doi.org/10.1007/s11192-016-2138-4
  abstract: Software plays an important role in the advancement of science. Software
    developers, users, and funding agencies have deep interests in the impact of software
    on science. This study investigates the use and impact of software by examining
    how software is mentioned and cited among 9548 articles published in PLOS ONE
    in 12 defined disciplines. Our results demonstrate that software is widely used
    in scientific research and a substantial uncitedness of software exists across
    different disciplines. Findings also show that the practice of software citations
    varies noticeably at the discipline level and software that is free for academic
    use is more likely to receive citations than commercial software.
