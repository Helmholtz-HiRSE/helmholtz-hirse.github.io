- id: kasprzak_six_2021
  type: article
  authors:
  - Peter Kasprzak
  - Lachlan Mitchell
  - Olena Kravchuk
  - Andy Timmins
  title: Six Years of Shiny in Research – Collaborative Development of Web Tools in
    R
  year: 2021
  abstract: The use of Shiny in research publications is investigated. From the appearance
    of this popular web application framework for R through to 2018, it has been utilised
    in many diverse research areas. While it can be shown that the complexity of Shiny
    applications is limited by the background architecture, and real security concerns
    exist for novice app developers, the collaborative benefits are worth attention
    from the wider research community. Shiny simplifies the use of complex methodologies
    for users of different specialities, at the level of proficiency appropriate for
    the end user. This enables a diverse community of users to interact efficiently,
    utilising cutting-edge methodologies. The literature reviewed demonstrates that
    complex methodologies can be put into practice without the necessity for investment
    in professional training. It would appear that Shiny opens up concurrent benefits
    in communication between those who analyse data and those in other disciplines,
    thereby potentially enriching research through this technology.
