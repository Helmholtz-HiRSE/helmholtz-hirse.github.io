- id: shortridge_talking_2009
  type: article
  authors:
  - Keith Shortridge
  title: Talking Amongst Ourselves - Communication in the Astronomical Software Community
  year: 2009
  url: http://arxiv.org/abs/0902.0255v1
  abstract: Meetings such as ADASS demonstrate that there is an enthusiasm for communication
    within the astronomical software community. However, the amount of information
    and experience that can flow around in the course of one, relatively short, meeting
    is really quite limited. Ideally, these meetings should be just a part of a much
    greater, continuous exchange of knowledge. In practice, with some notable - but
    often short-lived - exceptions, we generally fall short of that ideal. Keeping
    track of what is being used, where, and how successfully, can be a challenge.
    A variety of new technologies such as those roughly classed as 'Web 2.0' are now
    available, and getting information to flow ought to be getting simpler, but somehow
    it seems harder to find the time to keep that information current. This paper
    looks at some of the ways we communicate, used to communicate, have failed to
    communicate, no longer communicate, and perhaps could communicate better. It is
    presented in the hope of stimulating additional discussion - and possibly even
    a little action - aimed at improving the current situation.
- id: borne_astroinformatics_2009
  type: article
  authors:
  - Kirk D. Borne
  title: 'Astroinformatics: A 21ˢᵗ Century Approach to Astronomy'
  year: 2009
  url: http://arxiv.org/abs/0909.3892v1
  abstract: Data volumes from multiple sky surveys have grown from gigabytes into
    terabytes during the past decade, and will grow from terabytes into tens (or hundreds)
    of petabytes in the next decade. This exponential growth of new data both enables
    and challenges effective astronomical research, requiring new approaches. Thus
    far, astronomy has tended to address these challenges in an informal and ad hoc
    manner, with the necessary special expertise being assigned to e-Science or survey
    science. However, we see an even wider scope and therefore promote a broader vision
    of this data-driven revolution in astronomical research. For astronomy to effectively
    cope with and reap the maximum scientific return from existing and future large
    sky surveys, facilities, and data-producing projects, we need our own information
    science specialists. We therefore recommend the formal creation, recognition,
    and support of a major new discipline, which we call Astroinformatics. Astroinformatics
    includes a set of naturally-related specialties including data organization, data
    description, astronomical classification taxonomies, astronomical concept ontologies,
    data mining, machine learning, visualization, and astrostatistics. By virtue of
    its new stature, we propose that astronomy now needs to integrate Astroinformatics
    as a formal sub-discipline within agency funding plans, university departments,
    research programs, graduate training, and undergraduate education. Now is the
    time for the recognition of Astroinformatics as an essential methodology of astronomical
    research. The future of astronomy depends on it.
