  abstract: Software citation is good for research transparency and reproducibility,
    and maybe, if you work it right, for your CV, too. You can get credit and recognition
    through citations for your code! This presentation highlights several powerful
    methods for increasing the probability that use of your research software will
    be cited, and cited correctly. The presentation covers how to create codemeta.json
    and CITATION.cff automagically from Astrophysics Source Code Library (ASCL ascl.net)
    entries, edit, and use these files, the value of including such files on your
    code site(s), and efforts underway in astronomy and other fields to improve software
    citation and credit.
