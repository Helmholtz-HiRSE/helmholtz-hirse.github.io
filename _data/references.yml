  abstract: At Sandia National Laboratories, the Software Engineering and Research
    Department seeks to provide sustainable career pathways for research software
    engineers (RSEs). The conceptual model for our organization follows what we call
    a Research, Develop, and Deploy (RDD) workflow pattern, enabling RSEs to partner
    with research and deployment specialists. We argue that this interdisciplinary
    model allows our department to act as an incubator and an accelerator for impactful
    ideas. We describe these tactics and our experiences as a RSE team in a scientific
    computing center.
