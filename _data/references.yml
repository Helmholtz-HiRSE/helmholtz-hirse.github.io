- id: deutsche_forschungsgemeinschaft_ausschuss_fur_wissenschaftliche_bibliotheken_und_informationssysteme_digitale_2025
  type: article
  authors:
  - Deutsche Forschungsgemeinschaft. Ausschuss für Wissenschaftliche Bibliotheken
    und Informationssysteme
  title: Digitale Forschungspraxis und kooperative Informationsinfrastrukturen. Ein
    Diskussionspapier der Deutschen Forschungsgemeinschaft zu Förderung und Finanzierung
    wissenschaftlicher Informationsinfrastrukturen
  year: 2025
  doi: 10.5281/ZENODO.14621979
  url: https://zenodo.org/doi/10.5281/zenodo.14621979
  abstract: 'In ihrem Diskussionspapier „Digitale Forschungspraxis und kooperative
    Informationsinfrastrukturen`` analysiert die DFG übergreifende Herausforderungen
    und identifiziert Handlungsfelder für den Aufbau, die Weiterentwicklung und den
    langfristigen Betrieb wissenschaftlicher Informationsinfrastrukturen. Die im Papier
    entwickelten Handlungsfelder betreffen dabei sowohl das Förderhandeln der DFG
    als auch das Gesamtsystem wissenschaftlicher Informationsinfrastrukturen: Erstens
    sollte die Anschlussfähigkeit von Informationsinfrastrukturen und digitalen Objekten
    optimiert werden. In erster Linie sind hier technische Verbesserungen vonnöten;
    aber auch die organisatorische und soziale Anschlussfähigkeit sind mit zu bedenken.
    Zweitens ist es unverzichtbar, den kooperativen Betrieb von Informationsinfrastrukturen
    über geeignete Anreize weiter zu stimulieren. Drittens müssen die Nachnutzbarkeit
    vorhandener Technologien gefördert und der Betrieb wissenschaftsrelevanter Informationsinfrastrukturen
    auch langfristig gesichert werden. Nach Überzeugung der DFG lassen sich diese
    Handlungsfelder nur in geteilten Rollen und Verantwortlichkeiten unterschiedlicher
    Akteure aus Forschung, Einrichtungen der Informationsinfrastruktur, Forschungsförderorganisationen
    und Wissenschaftspolitik erfolgreich bearbeiten. Die DFG wird daher einen systematischen
    Dialogprozess initiieren, um übergreifende Herausforderungen zu erörtern und gemeinsam
    nach Lösungsansätzen zu suchen. Ziele dieses Prozesses sind die weitere Konturierung
    übergeordneter Herausforderungen und Handlungsfelder, die grundsätzliche Klärung
    von Rollen und Verantwortlichkeiten, aber auch die Weitung des Blickes für neue
    Fragen und Lösungsansätze. Als Ausgangspunkt für den Dialog formuliert die DFG
    in ihrem Papier „Fünf Thesen zur Zukunft der Informationsinfrastruktur``, die
    sich aus den im Papier beschriebenen Herausforderungen und den daraus abgeleiteten
    Handlungsfeldern ergeben. In its discussion paper ``Digital Research Practice
    and Cooperative Information Infrastructures'''', the DFG analyses overarching
    challenges and identifies fields of action in the establishment and expansion
    of scientific information infrastructures and their long-term operation. The fields
    of action outlined in the paper relate to both the DFG''s funding activities and
    the overall system of scientific information infrastructures. Firstly, the interoperability
    of information infrastructures and digital objects is to be optimised. This primarily
    requires technical improvements, though organisational and social interoperability
    also need to be taken into account. Secondly, it is essential to continue to foster
    the cooperative operation of information infrastructures based on the appropriate
    incentives. Thirdly, the reusability of existing technologies must be promoted,
    and the operation of research-related information infrastructures must be secured
    in the long term. The DFG believes that these fields of action can only be effectively
    addressed based on the sharing of roles and responsibilities among various stakeholders
    – including researchers, information infrastructure institutions, research funding
    organisations and research policy actors. For this reason, the DFG will initiate
    a systematic dialogue process to engage in discussion on overarching challenges
    and seek solutions on a collaborative basis. The objectives of this process are
    to further refine challenges and fields of action, fundamentally clarify roles
    and responsibilities, and broaden perspectives so as to be able to address new
    questions and solutions. As a starting point for this dialogue, the DFG presents
    ``Five Theses on the Future of Information Infrastructure'''' in its paper, which
    draw on the challenges and fields of action set out in the discussion paper.'
