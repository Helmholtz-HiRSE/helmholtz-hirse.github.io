  title: State of FAIRness in ESFRI Projects
  year: 2020
  journal: Data Intelligence
  volume: '2'
  number: 1-2
  pages: 230--237
  doi: 10.1162/dint_a_00045
  url: https://www.mitpressjournals.org/doi/abs/10.1162/dint%5Fa%5F00045
  abstract: Since 2009 initiatives that were selected for the roadmap of the European
    Strategy Forum on Research Infrastructures started working to build research infrastructures
    for a wide range of research disciplines. An important result of the strategic
    discussions was that distributed infrastructure scenarios were now seen as ``complex
    research facilities'' in addition to, for example traditional centralised infrastructures
    such as CERN. In this paper we look at five typical examples of such distributed
    infrastructures where many researchers working in different centres are contributing
    data, tools/services and knowledge and where the major task of the research infrastructure
    initiative is to create a virtually integrated suite of resources allowing researchers
    to carry out state-of-the-art research. Careful analysis shows that most of these
    research infrastructures worked on the Findability, Accessibility, Interoperability
    and Reusability dimensions before the term ``FAIR'' was actually coined. The definition
    of the FAIR principles and their wide acceptance can be seen as a confirmation
    of what these initiatives were doing and it gives new impulse to close still existing
    gaps. These initiatives also seem to be ready to take up the next steps which
    will emerge from the definition of FAIR maturity indicators. Experts from these
    infrastructures should bring in their 10-years' experience in this definition
    process.
- id: alliez_attributing_2020
  type: article
  authors:
  - Pierre Alliez
  - Roberto Di Cosmo
  - Benjamin Guedj
  - Alain Girault
  - Mohand-Saïd Hacid
  - Arnaud Legrand
  - Nicolas Rougier
  title: 'Attributing and Referencing (Research) Software: Best Practices and Outlook
    From Inria'
  year: 2020
  journal: Computing in Science Engineering
  volume: '22'
  number: '1'
  pages: 39--52
  doi: 10.1109/MCSE.2019.2949413
  abstract: 'Software is a fundamental pillar of modern scientific research, across
    all fields and disciplines. However, there is a lack of adequate means to cite
    and reference software due to the complexity of the problem in terms of authorship,
    roles, and credits. This complexity is further increased when it is considered
    over the lifetime of a software that can span up to several decades. Building
    upon the internal experience of Inria, the French research institute for digital
    sciences, we provide in this article a contribution to the ongoing efforts in
    order to develop proper guidelines and recommendations for software citation and
    reference. Namely, we recommend: first, a richer taxonomy for software contributions
    with a qualitative scale; second, to put humans at the heart of the evaluation;
    and third, to distinguish citation from reference.'
