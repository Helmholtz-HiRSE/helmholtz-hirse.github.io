- id: cosden_research_2022
  type: article
  authors:
  - Ian A. Cosden
  - Kenton McHenry
  - Daniel S. Katz
  title: 'Research Software Engineers: Career Entry Points and Training Gaps'
  year: 2022
  abstract: As software has become more essential to research across disciplines,
    and as the recognition of this fact has grown, the importance of professionalizing
    the development and maintenance of this software has also increased. The community
    of software professionals who work on this software have come together under the
    title Research Software Engineer (RSE) over the last decade. This has led to the
    formalization of RSE roles and organized RSE groups in universities, national
    labs, and industry. This, in turn, has created the need to understand how RSEs
    come into this profession and into these groups, how to further promote this career
    path to potential members, as well as the need to understand what training gaps
    need to be filled for RSEs coming from different entry points. We have categorized
    three main classifications of entry paths into the RSE profession and identified
    key elements, both advantages and disadvantages, that should be acknowledged and
    addressed by the broader research community in order to attract and retain a talented
    and diverse pool of future RSEs.
- id: cosden_rse_2022
  type: article
  authors:
  - Ian A. Cosden
  title: 'An RSE Group Model: Operational and Organizational Approaches From Princeton
    University''s Central Research Software Engineering Group'
  year: 2022
  doi: 10.48550/ARXIV.2210.16261
  abstract: The Princeton Research Software Engineering Group has grown rapidly since
    its inception in late 2016. The group, housed in the central Research Computing
    Department, comprised of professional Research Software Engineers (RSEs), works
    directly with researchers to create high quality research software to enable new
    scientific advances. As the group has matured so has the need for formalizing
    operational details and procedures. The RSE group uses an RSE partnership model,
    where Research Software Engineers work long-term with a designated academic department,
    institute, center, consortium, or individual principal investigator (PI). This
    article describes the operation of the central Princeton RSE group including funding,
    partner & project selection, and best practices for defining expectations for
    a successful partnership with researchers.
