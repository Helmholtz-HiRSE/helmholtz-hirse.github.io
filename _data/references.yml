  - Fotis Psomopoulos
  - Jennifer Harrow
  - Leyla Jael Castro
  - Morane Gruenpeter
  - Paula Andrea Martinez
  - Tom Honeyman
  title: Introducing the FAIR Principles for research software
  year: 2022
  journal: Scientific Data
  volume: '9'
  number: '1'
  pages: 622--622
  doi: 10.1038/s41597-022-01710-x
  url: https://doi.org/10.1038/s41597-022-01710-x
  abstract: Research software is a fundamental and vital part of research, yet significant
    challenges to discoverability, productivity, quality, reproducibility, and sustainability
    exist. Improving the practice of scholarship is a common goal of the open science,
    open source, and FAIR (Findable, Accessible, Interoperable and Reusable) communities
    and research software is now being understood as a type of digital object to which
    FAIR should be applied. This emergence reflects a maturation of the research community
    to better understand the crucial role of FAIR research software in maximising
    research value. The FAIR for Research Software (FAIR4RS) Working Group has adapted
    the FAIR Guiding Principles to create the FAIR Principles for Research Software
    (FAIR4RS Principles). The contents and context of the FAIR4RS Principles are summarised
    here to provide the basis for discussion of their adoption. Examples of implementation
    by organisations are provided to share information on how to maximise the value
    of research outputs, and to encourage others to amplify the importance and impact
    of this work.
