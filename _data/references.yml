  title: Introducing the FAIR Principles for Research Software
  year: 2022
  journal: Scientific Data
  volume: '9'
  pages: '622'
  doi: 10.1038/s41597-022-01710-x
  url: https://doi.org/10.1038/s41597-022-01710-x
  abstract: 'Research software is a fundamental and vital part of research, yet significant
    challenges to discoverability, productivity, quality, reproducibility, and sustainability
    exist. Improvements are needed to ensure research software is developed following
    best practices that encourage open and FAIR data principles. Here we introduce
    and discuss the FAIR Principles for Research Software (FAIR4RS Principles). These
    principles are a specialization of the FAIR Principles for scientific data management
    and stewardship. The FAIR4RS Principles are: Findable, Accessible, Interoperable,
    Reusable.'
