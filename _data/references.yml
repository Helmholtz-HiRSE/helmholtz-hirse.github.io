  title: 'The FAIR4RS team: Working together to make research software FAIR'
  year: 2021
  doi: 10.5281/ZENODO.5037157
  url: https://zenodo.org/record/5037157
  abstract: The FAIR For Research Software Working Group (FAIR4RS WG) is leading the
    research software community in the crucial step of agreeing how to apply the FAIR
    principles to research software, including defining the principles and adoption
    guidelines. This group was convened under the Research Software Alliance (ReSA),
    the Research Data Alliance (RDA), and FORCE11 (the Future of Research Communication
    and Escholarship). This paper explains how the community collaboration to enable
    this has been built, as an example of a model for teamwork across the research
    software community, and which could potentially be used in other fields and domains
    as well, as this is an interdisciplinary and global effort
