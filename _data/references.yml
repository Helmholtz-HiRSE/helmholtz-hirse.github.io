- id: xu_managing_2010
  type: inproceedings
  authors:
  - Hao Xu
  title: Managing Ubiquitous Scientific Knowledge on Semantic Web
  year: 2010
  booktitle: Advances in Computer Science and Information Technology
  pages: 421--430
  doi: 10.1007/978-3-642-13577-4_37
  abstract: Managing ubiquitous scientific knowledge is a part of daily life for scholars,
    while it also becomes a hot topic in the Semantic Web research community. In this
    paper, we propose a SKO Types framework aiming to facilitate managing ubiquitous
    Scientific Knowledge Objects (SKO) driven by semantic authoring, modularization,
    annotation and search. SKO Types framework comprises SKO Metadata Schema, SKO
    Patterns and SKO Editor corresponding to metadata layer, ontology layer and interface
    layer respectively. SKO Metadata Schema specifies sets of attributes describing
    SKOs individually and relationally. SKO Patterns is a three-ontology based model
    in order to modularize scientific publications syntactically and semantically,
    while SKO Editor supplies a LaTex-like mark-up language and editing environment
    for authoring and annotating SKOs concurrently.
