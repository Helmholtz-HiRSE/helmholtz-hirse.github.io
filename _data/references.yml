- id: schindler_multi-level_2023
  type: article
  authors:
  - David Schindler
  - Tazin Hossain
  - Sascha Spors
  - Frank Krüger
  title: A multi-level analysis of data quality for formal software citation
  year: 2023
  doi: 10.48550/ARXIV.2306.17535
  abstract: Software is a central part of modern science, and knowledge of its use
    is crucial for the scientific community with respect to reproducibility and attribution
    of its developers. Several studies have investigated in-text mentions of software
    and its quality, while the quality of formal software citations has only been
    analyzed superficially. This study performs an in-depth evaluation of formal software
    citation based on a set of manually annotated software references. It examines
    which resources are cited for software usage, to what extend they allow proper
    identification of software and its specific version, how this information is made
    available by scientific publishers, and how well it is represented in large-scale
    bibliographic databases. The results show that software articles are the most
    cited resource for software, while direct software citations are better suited
    for identification of software versions. Moreover, we found current practices
    by both, publishers and bibliographic databases, to be unsuited to represent these
    direct software citations, hindering large-scale analyses such as assessing software
    impact. We argue that current practices for representing software citations –
    the recommended way to cite software by current citation standards – stand in
    the way of their adaption by the scientific community, and urge providers of bibliographic
    data to explicitly model scientific software.
- id: schoch_computational_2023
  type: article
  authors:
  - David Schoch
  - Chung-hong Chan
  - Claudia Wagner
  - Arnim Bleier
  title: Computational Reproducibility in Computational Social Science
  year: 2023
  doi: 10.48550/ARXIV.2307.01918
  abstract: Replication crises have shaken the scientific landscape during the last
    decade. As potential solutions, open science practices were heavily discussed
    and have been implemented with varying success in different disciplines. We argue
    that computational-x disciplines such as computational social science, are also
    susceptible for the symptoms of the crises, but in terms of reproducibility. We
    expand the binary definition of reproducibility into a tier system which allows
    increasing levels of reproducibility based on external verfiability to counteract
    the practice of open-washing. We provide solutions for barriers in Computational
    Social Science that hinder researchers from obtaining the highest level of reproducibility,
    including the use of alternate data sources and considering reproducibility proactively.
