- id: murphy-hill_how_2015
  type: article
  authors:
  - Emerson Murphy-Hill
  - Da Young Lee
  - Gail C. Murphy
  - Joanna McGrenere
  title: How Do Users Discover New Tools in Software Development and Beyond?
  year: 2015
  journal: Computer Supported Cooperative Work (CSCW)
  volume: '24'
  number: '5'
  pages: 389--422
  doi: 10/ggnd4g
  abstract: Software users rely on software tools such as browser tab controls and
    spell checkers to work effectively and efficiently, but it is difficult for users
    to be aware of all the tools that might be useful to them. While there are several
    potential technical solutions to this difficulty, we know little about social
    solutions, such as one user telling a peer about a tool. To explore these social
    solutions, we conducted two studies, an interview study and a diary study. The
    interview study describes a series of interviews with 18 programmers in industry
    to explore how tool discovery takes place. To broaden our findings to a wider
    group of software users, we then conducted a diary study of 76 software users
    in their workplaces. One finding was that social learning of software tools, while
    sometimes effective, is infrequent; software users appear to discover tools from
    peers only once every few months. We describe several implications of our findings,
    such as that discovery from peers can be enhanced by improving software users
    ability to communicate openly and concisely about tools.
