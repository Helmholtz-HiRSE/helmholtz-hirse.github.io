  title: What Do We (Not) Know About Research Software Engineering?
  year: 2022
  journal: Journal of Open Research Software
  volume: '10'
  doi: 10.5334/jors.384
  abstract: 'As recognition of the vital importance of software for contemporary research
    is increasing, Research Software Engineering (RSE) is emerging as a discipline
    in its own right. We present an inventory of relevant research questions about
    RSE as a basis for future research and initiatives to advance the field, highlighting
    selected literature and initiatives. This work is the outcome of a RSE community
    workshop held as part of the 2020 International Series of Online Research Software
    Events (SORSE) which identified and prioritized key questions across three overlapping
    themes: people, policy and infrastructure. Almost half of the questions focus
    on the people theme, which addresses issues related to career paths, recognition
    and motivation; recruitment and retention; skills; and diversity, equity and inclusion.
    However, the people and policy themes have the same number of prioritized questions.
    We recommend that different types of stakeholders, such as RSE employers and policy
    makers, take responsibility for supporting or encouraging answering of these questions
    by organizations that have an interest. Initiatives such as the International
    Council of RSE Associations should also be engaged in this work.'
