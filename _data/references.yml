- id: bajraktari_requirements_2024
  type: article
  authors:
  - Adrian Bajraktari
  - Michelle Binder
  - Andreas Vogelsang
  title: 'Requirements Engineering for Research Software: A Vision'
  year: 2024
  doi: 10.48550/ARXIV.2405.07781
  abstract: Modern science is relying on software more than ever. The behavior and
    outcomes of this software shape the scientific and public discourse on important
    topics like climate change, economic growth, or the spread of infections. Most
    researchers creating software for scientific purposes are not trained in Software
    Engineering. As a consequence, research software is often developed ad hoc without
    following stringent processes. With this paper, we want to characterize research
    software as a new application domain that needs attention from the Requirements
    Engineering community. We conducted an exploratory study based on 8 interviews
    with 12 researchers who develop software. We describe how researchers elicit,
    document, and analyze requirements for research software and what processes they
    follow. From this, we derive specific challenges and describe a vision of Requirements
    Engineering for research software.
- id: correa_reproducible_2024
  type: article
  authors:
  - Alan Correa
  - Anil Yildiz
  - Julia Kowalski
  title: Reproducible Workflows and Compute Environments for Reusable Datasets, Simulations
    and Research Software
  year: 2024
  doi: 10.5194/egusphere-egu24-18724
  abstract: The pursuit of reproducibility in research has long been emphasized. It
    is even more critical in geohazards research and practice, where model-based decision-making
    needs to be transparent for trustworthy applications. However, enabling reproducibility
    in process-based or machine learning workflows requires time, energy, and sometimes
    manual operations or even unavailable resources. Moreover, the diversity in modern
    compute environments, both in hardware and software, significantly hinders the
    path to reproducibility. While many researchers focus on reproducibility, we advocate
    that reusability holds greater value and inherently requires the former. Reusable
    datasets and simulations can allow for transparent and reliable decision support,
    analysis as well as benchmarking studies. Reusable research software can foster
    composition and faster development of complex projects, while avoiding the reinvention
    of complicated data structures and algorithms. Establishing reproducible workflows
    and compute environments is vital to enable and ensure reusability. Prioritising
    reproducible workflows is crucial for individual use, while both reproducible
    compute environments and workflows are essential for broader accessibility and
    reuse by others. We present herein various challenges faced in coming up with
    reproducible workflows and compute environments along with solution strategies
    and recommendations through experiences from two projects in geohazards research.
    We discuss an object-oriented approach to simulation workflows, automated metadata
    extraction and data upload, unique identification of datasets (assets) and simulation
    workflows (processes) through cryptographic hashes. We investigate essential factors,
    such as software versioning and dependency management, reproducibility across
    diverse hardware used by researchers, and time to first reproduction/reuse (TTFR),
    to establish reproducible computational environments. Finally, we shall explore
    the landscape of reproducibility in compute environments, covering language-agnostic
    package managers, containers, and language-specific package managers supporting
    binary dependencies.
