  title: 'An environment for sustainable research software in Germany and beyond:
    current state, open challenges, and call for action'
  year: 2021
  journal: F1000Research
  volume: '9'
  pages: '295'
  doi: 10.12688/f1000research.23224.2
  url: https://doi.org/10.12688/f1000research.23224.2
  abstract: Research software has become a central asset in academic research. It
    optimizes existing and enables new research processes, through offering immense
    flexibility for the implementation of research ideas. However, unless carefully
    maintained, research software rapidly loses its ability to reproduce and build
    upon previously obtained research results. This requires a change in the academic
    culture and requires measures ensuring that research software is sustainably developed
    and openly shared. Here we provide an overview of the current status of research
    software development in Germany as a specific example of a country with a large
    and well-funded research landscape. We report on the challenges thwarting current
    efforts to ensure sustainable research software development and distribution.
    Besides technical challenges, we identify the lack of an environment supportive
    of sustainable research software development as the key problem. Drawing on the
    expertise of our community and existing successful examples, we suggest strategies
    and measures to address the challenges identified. With this, we aim to contribute
    to an ongoing international discussion on how to ensure that research software
    development follows best practices and that software itself becomes a fully recognized
    and re-usable scientific artifact.
