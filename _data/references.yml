  title: PARTHENOS Guidelines to FAIRify data management and make data reusable
  year: 2018
  doi: 10.5281/zenodo.2668479
  url: https://zenodo.org/record/2668479#.XrpjgBNKiL6
  abstract: 'A comprehensive set of PARTHENOS Guidelines to FAIRify data management
    and make data reusable is focusing on the topic of common policies. This compact
    guide offers twenty guidelines to align the efforts of data producers, data archivists
    and data users in humanities and social sciences to make research data as reusable
    as possible based upon the FAIR Principles. Each guideline has recommendations
    for both researchers and archives as it is recognised that different priorities
    may apply to each case. The guidelines result from the work of over fifty PARTHENOS
    project members. They were responsible for investigating commonalities in the
    implementation of policies and strategies for research data management and used
    results from desk research, questionnaires and interviews with selected experts
    to gather around one hundred current data management policies (including guides
    for preferred formats, data review policies and best practices, both formal as
    well as tacit). Translations of the Guidelines are available in: French: "PARTHENOS
    Recommandations pour FAIRiser vos données" (https://doi.org/10.5281/zenodo.3463521)
