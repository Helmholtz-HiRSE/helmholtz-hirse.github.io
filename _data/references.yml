- id: van_de_sandt_practice_2019
  type: article
  authors:
  - Stephanie van de Sandt
  - Lars Holm Nielsen
  - Alexandros Ioannidis
  - August Muench
  - Edwin Henneken
  - Alberto Accomazzi
  - Chiara Bigarella
  - Jose Benito Gonzalez Lopez
  - Sünje Dallmeier-Tiessen
  title: 'Practice meets Principle: Tracking Software and Data Citations to Zenodo
    DOIs'
  year: 2019
  url: https://arxiv.org/pdf/1911.00295.pdf
  abstract: Data and software citations are crucial for the transparency of research
    results and for the transmission of credit. But they are hard to track, because
    of the absence of a common citation standard. As a consequence, the FORCE11 recently
    proposed data and software citation principles as guidance for authors. Zenodo
    is recognized for the implementation of DOIs for software on a large scale. The
    minting of complementary DOIs for the version and concept allows measuring the
    impact of dynamic software. This article investigates characteristics of 5,456
    citations to Zenodo data and software that were captured by the Asclepias Broker
    in January 2019. We analyzed the current state of data and software citation practices
    and the quality of software citation recommendations with regard to the impact
    of recent standardization efforts. Our findings prove that current citation practices
    and recommendations do not match proposed citation standards. We consequently
    suggest practical first steps towards the implementation of the software citation
    principles.
