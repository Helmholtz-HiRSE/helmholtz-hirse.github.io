  title: 'Doing Data Science on the Shoulders of Giants: The Value of Open Source
    Software for the Data Science Community'
  year: 2020
  journal: Harvard Data Science Review
  url: https://hdsr.mitpress.mit.edu/pub/xsrt4zs2/release/2
  abstract: Open source software is ubiquitous throughout data science, and enables
    the work of nearly every data scientist in some way or another. Open source projects,
    however, are disproportionately maintained by a small number of individuals, some
    of whom are institutionally supported, but many of whom do this maintenance on
    a purely volunteer basis. The health of the data science ecosystem depends on
    the support of open source projects, on an individual and institutional level.
- id: bercic_deep_2020
  type: article
  authors:
  - Katja Berčič
