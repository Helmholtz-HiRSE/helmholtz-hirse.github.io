- id: cohen_rses_2020
  type: article
  authors:
  - Jeremy Cohen
  - Mark Woodbridge
  title: 'RSEs in Research? RSEs in IT?: Finding a suitable home for RSEs'
  year: 2020
  abstract: The term Research Software Engineer (RSE) was first used in the UK research
    community in 2012 to refer to individuals based in research environments who focus
    on the development of software to support and undertake research. Since then,
    the term has gained wide adoption and many RSE groups and teams have been set
    up at institutions within the UK and around the world. There is no "manual" for
    establishing an RSE group! These groups are often set up in an ad hoc manner based
    on what is practical within the context of each institution. Some of these groups
    are based in a central IT environment, others are based in research groups in
    academic departments. Is one option better than another? What are the pros and
    cons of different options? In this position paper we look at some arguments for
    where RSE teams fit best within academic institutions and research organisations
    and consider whether there is an ideal "home" for RSEs.
- id: leipzig_role_2020
  type: article
  authors:
  - Jeremy Leipzig
  - Daniel Nüst
  - Charles Tapley Hoyt
  - Stian Soiland-Reyes
  - Karthik Ram
  - Jane Greenberg
  title: The role of metadata in reproducible computational research
  year: 2020
  abstract: Reproducible computational research (RCR) is the keystone of the scientific
    method for in silico analyses, packaging the transformation of raw data to published
    results. In addition to its role in research integrity, RCR has the capacity to
    significantly accelerate evaluation and reuse. This potential and wide-support
    for the FAIR principles have motivated interest in metadata standards supporting
    RCR. Metadata provides context and provenance to raw data and methods and is essential
    to both discovery and validation. Despite this shared connection with scientific
    data, few studies have explicitly described the relationship between metadata
    and RCR. This article employs a functional content analysis to identify metadata
    standards that support RCR functions across an analytic stack consisting of input
    data, tools, notebooks, pipelines, and publications. Our article provides background
    context, explores gaps, and discovers component trends of embeddedness and methodology
    weight from which we derive recommendations for future work.
