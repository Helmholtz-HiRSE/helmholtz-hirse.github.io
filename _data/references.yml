  title: Implementation and relevance of FAIR data principles in biopharmaceutical
    R&D
  year: 2019
  journal: Drug Discovery Today
  volume: '24'
  number: '4'
  pages: 933--938
  doi: 10.1016/j.drudis.2019.01.008
  url: http://www.sciencedirect.com/science/article/pii/S1359644618303039
  abstract: Biopharmaceutical industry R&D, and indeed other life sciences R&D such
    as biomedical, environmental, agricultural and food production, is becoming increasingly
    data-driven and can significantly improve its efficiency and effectiveness by
    implementing the FAIR (findable, accessible, interoperable, reusable) guiding
    principles for scientific data management and stewardship. By so doing, the plethora
    of new and powerful analytical tools such as artificial intelligence and machine
    learning will be able, automatically and at scale, to access the data from which
    they learn, and on which they thrive. FAIR is a fundamental enabler for digital
    transformation.
- id: davidson_d31_2019
  type: article
  authors:
  - Joy Davidson
  - Claudia Engelhardt
  - Vanessa Proudman
  - Lennart Stoy
  - Angus Whyte
  title: D3.1 FAIR Policy Landscape Analysis
  year: 2019
  doi: 10.5281/zenodo.3558173
  url: https://zenodo.org/record/3558173#.XrpfmhNKiL4
  abstract: 'As part of the EOSC project family the FAIRsFAIR - Fostering Fair Data
    Practices in Europe - project aims to supply practical solutions for the use of
    the FAIR data principles throughout the research data life cycle. The FAIRsFAIR
    project runs from March 2019-February 2022. Policies are a crucial component in
    the FAIR ecosystem. To this end, FAIRsFAIR Work Package 3 (WP3): FAIR Data Policy
    and Practice carried out an analysis of the current data policy landscape at various
    levels (national, funder, publisher, institutional) to provide a snapshot of the
    situation in 2019 and to identify policy elements that support or hinder FAIR
    data practice. To provide a comparative baseline for reviewing the data policies
    of various stakeholders, the priority and supporting actions presented in the
    Turning FAIR into Reality (TFiR) action plan were employed. To assess how well
    the policies of different stakeholders currently reflect TFiR''s action plan,
    we carried out desk research to characterise policies, undertook an analysis of
    responses to an open consultation, and conducted a small number of interviews.
    This report presents the findings of these landscape assessment activities and
    provides an evidence base for FAIRsFAIR to build upon as work begins to define
    a set of practical recommendations to support policy enhancement (D3.3). Landscaping
    activities have been a core activity during the initial stages of the FAIRsFAIR
    project and there has been close cooperation with colleagues in Work Package 3
    carrying out the FAIR data policy and practice analyses; Work Package 2 on assessing
    FAIR requirements for interoperability and persistence; Work Package 6 on providing
    an overview of research communities'' needs for competence centres; and Work Package
    7 on mapping RDM policies and support as well as FAIR education offerings in European
    HEIs. In particular, efforts were made to avoid duplication of effort across the
    three open consultation and survey instruments developed to assess the current
    landscape and to define a consistent approach to presenting our findings. This
