- id: druskat_software_2019
  type: article
  authors:
  - Stephan Druskat
  title: Software and their Dependencies in Research Citation Graphs
  year: 2019
  url: http://arxiv.org/abs/1906.06141v1
  abstract: Software is essential for a lot of research, but it is not featured in
    citation graphs which have the potential to assign credit for software contributions.
    This is due to a traditionalistic focus on textual research products. In this
    paper, I propose an updated model for citation graphs that include software. This
    model takes into account intrinsic properties of software, and requirements for
    a robust system of software citation. I also give an outlook on future work to
    implement transitive credit, which is at the core of a fair system of academic
    citation which accounts for software on par with other research products.
