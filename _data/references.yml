- id: xiao_social_2014
  type: inproceedings
  authors:
  - Shundan Xiao
  - Jim Witschey
  - Emerson Murphy-Hill
  title: 'Social influences on secure development tool adoption: why security tools
    spread'
  year: 2014
  pages: 1095--1106
  doi: 10/ggnd4j
  abstract: Security tools can help developers build more secure software systems
    by helping developers detect or fix security vulnera- bilities in source code.
    However, developers do not always use these tools. In this paper, we investigate
    a number of so- cial factors that impact developers adoption decisions, based
    on a multidisciplinary field of research called diffusion of in- novations. We
    conducted 42 one-on-one interviews with pro- fessional software developers, and
    our results suggest a num- ber of ways in which security tool adoption depends
    on de- velopers social environments and on the channels through which information
    about tools is communicated. For exam- ple, some participants trusted developers
    with strong reputa- tions on the Internet as much as they trust their colleagues
    for information about security tools.
