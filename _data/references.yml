- id: heroux_research_2022
  type: article
  authors:
  - Michael A. Heroux
  title: 'Research Software Science: Expanding the Impact of Research Software Engineering'
  year: 2022
  doi: 10.48550/ARXIV.2211.09034
  abstract: Software plays a central role in scientific discovery. Improving how we
    develop and use software for research can have both broad and deep impacts on
    a spectrum of challenges and opportunities society faces today. The emergence
    of Research Software Engineer (RSE) as a role correlates with the growing complexity
    of scientific challenges and diversity of software team skills. In this paper,
    we describe research software science (RSS), an idea related to RSE, and particularly
    suited to research software teams. RSS promotes the use of scientific methodologies
    to explore and establish broadly applicable knowledge. Using RSS, we can pursue
    sustainable, repeatable, and reproducible software improvements that positively
    impact research software toward improved scientific discovery.
