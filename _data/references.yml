- id: kugler_interoperable_2018
  type: article
  authors:
  - Tracy A. Kugler
  - Catherine A. Fitch
  title: Interoperable and accessible census and survey data from IPUMS
  year: 2018
  journal: Scientific Data
  volume: '5'
  number: '1'
  pages: '180007'
  doi: 10.1038/sdata.2018.7
  url: https://www.nature.com/articles/sdata20187
  abstract: The first version of the Integrated Public Use Microdata Series (IPUMS)
    was released to users in 1993, and since that time IPUMS has come to stand for
    interoperable and accessible census and survey data. Initially created to harmonize
    U.S. census microdata over time, IPUMS now includes microdata from the U.S. and
    international censuses and from surveys on health, employment, and other topics.
    IPUMS also provides geo-spatial data, aggregate population data, and environmental
    data. IPUMS supports ten data products, each disseminating an integrated data
    collection with a set of tools that make complex data easy to find, access, and
    use. Key features are record-level integration to create interoperable datasets,
    user-friendly interfaces, and comprehensive metadata and documentation. The IPUMS
    philosophy aligns closely with the FAIR principles of findability, accessibility,
    interoperability, and re-usability. IPUMS data have catalyzed knowledge generation
    across a wide range of social science and other disciplines, as evidenced by the
    large volume of publications and other products created by the vast IPUMS user
    community.
- id: kanewala_testing_2018
  type: article
  authors:
  - Upulee Kanewala
  - James M. Bieman
  title: 'Testing Scientific Software: A Systematic Literature Review'
  year: 2018
  url: http://arxiv.org/abs/1804.01954v1
  abstract: 'Context: Scientific software plays an important role in critical decision
    making, for example making weather predictions based on climate models, and computation
    of evidence for research publications. Recently, scientists have had to retract
    publications due to errors caused by software faults. Systematic testing can identify
    such faults in code. Objective: This study aims to identify specific challenges,
    proposed solutions, and unsolved problems faced when testing scientific software.
    Method: We conducted a systematic literature survey to identify and analyze relevant
    literature. We identified 62 studies that provided relevant information about
    testing scientific software. Results: We found that challenges faced when testing
    scientific software fall into two main categories: (1) testing challenges that
    occur due to characteristics of scientific software such as oracle problems and
    (2) testing challenges that occur due to cultural differences between scientists
    and the software engineering community such as viewing the code and the model
    that it implements as inseparable entities. In addition, we identified methods
    to potentially overcome these challenges and their limitations. Finally we describe
    unsolved challenges and how software engineering researchers and practitioners
    can help to overcome them. Conclusions: Scientific software presents special challenges
    for testing. Specifically, cultural differences between scientist developers and
    software engineers, along with the characteristics of the scientific software
    make testing more difficult. Existing techniques such as code clone detection
    can help to improve the testing process. Software engineers should consider special
    challenges posed by scientific software such as oracle problems when developing
    testing techniques.'
