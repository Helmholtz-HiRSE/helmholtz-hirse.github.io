  url: https://peerj.com/articles/13933
  abstract: This research aimed to understand the needs and habits of researchers
    in relation to code sharing and reuse; gather feedback on prototype code notebooks
    created by NeuroLibre; and help determine strategies that publishers could use
    to increase code sharing. We surveyed 188 researchers in computational biology.
    Respondents were asked about how often and why they look at code, which methods
    of accessing code they find useful and why, what aspects of code sharing are important
    to them, and how satisfied they are with their ability to complete these tasks.
    Respondents were asked to look at a prototype code notebook and give feedback
    on its features. Respondents were also asked how much time they spent preparing
    code and if they would be willing to increase this to use a code sharing tool,
    such as a notebook. As a reader of research articles the most common reason (70%)
    for looking at code was to gain a better understanding of the article. The most
    commonly encountered method for code sharing–linking articles to a code repository–was
    also the most useful method of accessing code from the reader's perspective. As
    authors, the respondents were largely satisfied with their ability to carry out
    tasks related to code sharing. The most important of these tasks were ensuring
    that the code was running in the correct environment, and sharing code with good
    documentation. The average researcher, according to our results, is unwilling
    to incur additional costs (in time, effort or expenditure) that are currently
    needed to use code sharing tools alongside a publication. We infer this means
    we need different models for funding and producing interactive or executable research
    outputs if they are to reach a large number of researchers. For the purpose of
    increasing the amount of code shared by authors, PLOS Computational Biology is,
    as a result, focusing on policy rather than tools.
- id: barba_defining_2022
  type: article
  authors:
  - Lorena A. Barba
  title: Defining the role of open source software in research reproducibility
  year: 2022
  abstract: Reproducibility is inseparable from transparency, as sharing data, code
    and computational environment is a pre-requisite for being able to retrace the
    steps of producing the research results. Others have made the case that this artifact
    sharing should adopt appropriate licensing schemes that permit reuse, modification
    and redistribution. I make a new proposal for the role of open source software,
    stemming from the lessons it teaches about distributed collaboration and a commitment-based
    culture. Reviewing the defining features of open source software (licensing, development,
    communities), I look for explanation of its success from the perspectives of connectivism
    – a learning theory for the digital age – and the language-action framework of
    Winograd and Flores. I contend that reproducibility is about trust, which we build
    in community via conversations, and open source software is a route to learn how
    to be more effective learning (discovering) together.
- id: hirsch_resus_2022
