- id: grosbol_making_2010
  type: article
  authors:
  - P. Grosbol
  - D. Tody
  title: Making Access to Astronomical Software More Efficient
  year: 2010
  url: http://arxiv.org/abs/1004.4430v1
  abstract: Access to astronomical data through archives and VO is essential but does
    not solve all problems. Availability of appropriate software for analyzing the
    data is often equally important for the efficiency with which a researcher can
    publish results. A number of legacy systems (e.g. IRAF, MIDAS, Starlink, AIPS,
    Gipsy), as well as others now coming online are available but have very different
    user interfaces and may no longer be fully supported. Users may need multiple
    systems or stand-alone packages to complete the full analysis which introduces
    significant overhead. The OPTICON Network on `Future Astronomical Software Environments'
    and the USVAO have discussed these issues and have outlined a general architectural
    concept that solves many of the current problems in accessing software packages.
    It foresees a layered structure with clear separation of astronomical code and
    IT infrastructure. By relying on modern IT concepts for messaging and distributed
    execution, it provides full scalability from desktops to clusters of computers.
    A generic parameter passing mechanism and common interfaces will offer easy access
    to a wide range of astronomical software, including legacy packages, through a
    single scripting language such as Python. A prototype based upon a proposed standard
    architecture is being developed as a proof-of-concept. It will be followed by
    definition of standard interfaces as well as a reference implementation which
    can be evaluated by the user community. For the long-term success of such an environment,
    stable interface specifications and adoption by major astronomical institutions
    as well as a reasonable level of support for the infrastructure are mandatory.
    Development and maintenance of astronomical packages would follow an open-source,
    Internet concept.
- id: bechhofer_research_2010
  type: article
  authors:
  - Sean Bechhofer
  - David De Roure
  - Matthew Gamble
  - Carole Goble
  - Iain Buchan
  title: 'Research Objects: Towards Exchange and Reuse of Digital Knowledge'
  year: 2010
  journal: Nature Precedings
  doi: 10.1038/npre.2010.4626.1
  url: http://www.nature.com/articles/npre.2010.4626.1
  abstract: Abstract What will researchers be publishing in the future? Whilst there
    is little question that the Web will be the publication platform, as scholars
    move away from paper towards digital content, there is a need for mechanisms that
    support the production of self-contained units of knowledge and facilitate the
    publication, sharing and reuse of such entities. In this paper we discuss the
    notion of research objects , semantically rich aggregations of resources, that
    can possess some scientific intent or support some research objective. We present
    a number of principles that we expect such objects and their associated services
    to follow.
