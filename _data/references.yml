  title: The Astropy Problem
  year: 2016
  url: http://arxiv.org/abs/1610.03159v1
  abstract: The Astropy Project (http://astropy.org) is, in its own words, "a community
    effort to develop a single core package for Astronomy in Python and foster interoperability
    between Python astronomy packages." For five years this project has been managed,
    written, and operated as a grassroots, self-organized, almost entirely volunteer
    effort while the software is used by the majority of the astronomical community.
    Despite this, the project has always been and remains to this day effectively
    unfunded. Further, contributors receive little or no formal recognition for creating
    and supporting what is now critical software. This paper explores the problem
    in detail, outlines possible solutions to correct this, and presents a few suggestions
    on how to address the sustainability of general purpose astronomical software.
