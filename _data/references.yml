  abstract: What does it take to build a thriving community for research software
    engineers? How do we find RSEs and then engage them in our community? What activities
    should we focus our precious time and energy on?All these questions and more are
    often asked by those trying to build a community in research software engineering,
    in many countries and institutions with varying degrees of success. In this talk,
    I will draw from my experience in the UK and take a look at the successes and
    challenges in the UK RSE Community followed by presenting my current work of building
    an RSE community at Forschungszentrum Jülich in Germany. I will talk about the
    various activities that can be useful in building a community at a national and
    institutional level.
