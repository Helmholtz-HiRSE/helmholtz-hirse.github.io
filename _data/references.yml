  title: D3.3 Policy Enhancement Recommendations
  year: 2020
  doi: 10.5281/zenodo.3686901
  url: https://zenodo.org/record/3686901
  abstract: 'FAIRsFAIR''s analysis of the data policy landscape in 2019 (D3.1 FAIR
    Policy Landscape Analysis) has shown that the priority and supporting actions
    outlined in the Turning FAIR into Reality (TFiR) report are being reflected in
    the policies of funding bodies, publishers/journals and Research Performing Organisations
    (RPOs) to some extent. However, as crucial components in the FAIR ecosystem, there
    is still much that needs to be done to foster and harmonise policies to support
    the aims of the European Open Science Cloud and realise the vision of TFiR. Based
    on this initial landscape assessment and the work of related initiatives, FAIRsFAIR
    has prepared a series of practical recommendations for policy enhancement to support
    the realisation of a FAIR ecosystem. These recommendations are released as a living
    document that will be refined to reflect the forthcoming work of other projects
    funded under the INFRAEOSC-05-2018-2019 call and other relevant initiatives. This
    is the draft version of the deliverable not yet approved by the European Commission.
    Though we can''t undertake to respond to every comment directly, we are seeking
    wide feedback on this deliverable which will inform discussions and further work
    within FAIRsFAIR as well as collaborations with other relevant projects. Comments
    and suggestions can be added until 17 April 2020 at: https://drive.google.com/file/d/1haEU9D-VPJkG7uwxvFBOVFZCxl7NK6wR/view?usp=sharing'
