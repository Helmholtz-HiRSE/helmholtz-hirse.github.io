- id: twidale_over_2005
  type: article
  authors:
  - Michael B. Twidale
  title: 'Over the shoulder learning: supporting brief informal learning'
  year: 2005
  journal: Computer supported cooperative work (CSCW)
  volume: '14'
  number: '6'
  pages: 505--547
  doi: 10/bcpdqn
  abstract: The paper reviews work on informal technical help giving between colleagues.
    It concentrates on the process of how colleagues help each other to use a computer
    application to achieve a specific work task, contrasting this with the focus of
    much prior work on sur- rounding issues like the choice of whom to ask, information
    re-use and the larger work context of encouragement or otherwise of such learning.
    By an analysis of the literature and a study of office activity, some strengths
    and weaknesses of the method are identified. The difficulties of talking about
    the process of performing graphical user interface actions are explored. Various
    design implications for functionalities to improve the efficiency of informal
    help giving are explored. A consideration of informal learning can help in designing
    more effective, learnable, robust and acceptable CSCW systems. It also provides
    a different perspective on interface design as an exploration of features to support
    human–human interaction, using the computer screen as a shared resource to support
    this. In this way CSCW research may contribute to HCI research, since during such
    help giving, all computer systems are at least temporarily collab- orative applications.
