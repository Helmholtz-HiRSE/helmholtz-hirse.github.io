- id: konkol_publishing_2020
  type: article
  authors:
  - Markus Konkol
  - Daniel Nüst
  - Laura Goulier
  title: Publishing computational research. A review of infrastructures for reproducible
    and transparent scholarly communication
  year: 2020
  abstract: Funding agencies increasingly ask applicants to include data and software
    management plans into proposals. In addition, the author guidelines of scientific
    journals and conferences more often include a statement on data availability,
    and some reviewers reject unreproducible submissions. This trend towards open
    science increases the pressure on authors to provide access to the source code
    and data underlying the computational results in their scientific papers. Still,
    publishing reproducible articles is a demanding task and not achieved simply by
    providing access to code scripts and data files. Consequently, several projects
    develop solutions to support the publication of executable analyses alongside
    articles considering the needs of the aforementioned stakeholders. The key contribution
    of this paper is a review of applications addressing the issue of publishing executable
    computational research results. We compare the approaches across properties relevant
    for the involved stakeholders, e.g., provided features and deployment options,
    and also critically discuss trends and limitations. The review can support publishers
    to decide which system to integrate into their submission process, editors to
    recommend tools for researchers, and authors of scientific papers to adhere to
    reproducibility principles.
- id: kurtz_enabling_2020
  type: article
  authors:
  - Michael J. Kurtz
  - Alberto Accomazzi
  - Edwin A. Henneken
  title: 'Enabling Synergy: Improving the Information Infrastructure for Planetary
    Science'
  year: 2020
  abstract: In this whitepaper we advocate that the Planetary Science (PS) community
    build a discipline-specific digital library, in collaboration with the existing
    astronomy digital library, ADS. We suggest that the PS data archives increase
    their level of curation to allow for direct linking between the archival data
    and the derived journal articles. And we suggest that a new component of the PS
    information infrastructure be created to collate and curate information on features
    and objects in our solar system, beginning with the USGS/IAU Gazetteer of Planetary
    Nomenclature.
- id: mundt_how_2020
  type: article
  authors:
  - Miranda Mundt
  - Evan Harvey
  title: How Research Software Engineers Can Support Scientific Software
  year: 2020
  abstract: We are research software engineers and team members in the Department
    of Software Engineering and Research at Sandia National Laboratories, an organization
    which aims to advance software engineering in the domain of computational science.
    Our team hopes to promote processes and principles that lead to quality, rigor,
    correctness, and repeatability in the implementation of algorithms and applications
    in scientific software for high consequence applications. We use our experience
    to argue that there is a readily achievable set of software tools and best practices
    with a large return on investment that can be imparted upon scientific researchers
    that will remarkably improve the quality of software and, as a result, the quality
    of research.
