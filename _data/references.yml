  title: Giving RSEs a Larger Stage through the Better Scientific Software Fellowship
  year: 2022
  doi: 10.48550/ARXIV.2211.07436
  abstract: The Better Scientific Software Fellowship (BSSwF) was launched in 2018
    to foster and promote practices, processes, and tools to improve developer productivity
    and software sustainability of scientific codes. BSSwF's vision is to grow the
    community with practitioners, leaders, mentors, and consultants to increase the
    visibility of scientific software production and sustainability. Over the last
    five years, many fellowship recipients and honorable mentions have identified
    as research software engineers (RSEs). This paper provides case studies from several
    of the program's participants to illustrate some of the diverse ways BSSwF has
    benefited both the RSE and scientific communities. In an environment where the
    contributions of RSEs are too often undervalued, we believe that programs such
    as BSSwF can be a valuable means to recognize and encourage community members
    to step outside of their regular commitments and expand on their work, collaborations
    and ideas for a larger audience.
