  - Lars Grunske
  title: Challenges for Verifying and Validating Scientific Software in Computational
    Materials Science
  year: 2019
  journal: 2019 IEEE/ACM 14ᵗʰ International Workshop on Software Engineering for Science
    (SE4Science)
  doi: 10.1109/SE4Science.2019.00010
  abstract: Many fields of science rely on software systems to answer different research
    questions. For valid results researchers need to trust the results scientific
    software produces, and consequently quality assurance is of utmost importance.
    In this paper we are investigating the impact of quality assurance in the domain
    of computational materials science (CMS). Based on our experience in this domain
    we formulate challenges for validation and verification of scientific software
    and their results. Furthermore, we describe directions for future research that
    can potentially help dealing with these challenges.
