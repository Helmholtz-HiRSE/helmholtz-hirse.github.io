  title: Taxonomy and metadata for wind energy Research &Development
  year: 2017
  doi: 10.5281/zenodo.1199489
  url: https://zenodo.org/record/1199489#.XrpibxNKiL5
  abstract: 'The Open Access (OA) to knowledge is a principle established by the European
    Commission, underlying the H2020 EU Framework Programme for Research and Innovation.
    OA aims at optimizing the impact of publicly funded projects, by making information
    openly available and reusable to everyone in Europe. The Open Data (OD) policy
    is part of the OA strategy and is widely acknowledged as a fundamental step to
    support a fast track from research to innovation. Although there is a general
    acknowledgment for the need of OD, a mindset similar to the "not-in-my-backyard"
    holds back the scientific and industrial communities to implement a joint OD policy.
    This is partly due to the fear that sensitive and proprietary data could be misused.
    To overcome this problem, the European Commission posed an important milestone
    by declaring that data must be at the same time ``Findable, Accessible, Interoperable
    and Reusable (FAIR)'''' and ``as much open as possible, and as closed as necessary''''.
    The Joint Programme on Wind Energy of the European Energy Research Alliance (EERA
    JPWind), represents the largest public European scientific community in the Wind
    Energy (WE) sector. JP WIND recognises the necessity of implementing an OD plan
    by setting the goal to create a data portal. The data portal will a) collect information
    on data from ``cloud distributed'''' data centers, b) catalogue the collected
    information and c) provide end-users with tools to find data for their needs.
    In this report, we focus on the first phase that lays the basis for the implementation
    of a Data Web Portal i.e. the information architecture to make data Findable and
    Interoperable. The first phase relates to making data ``Findable'''' and ``Interoperable''''
    helping data owners to describe the data and end-users to accurately locate and
    retrieve the needed data. There are two components for this task: (i) Metadata
    (data tagging) and (ii) taxonomy for the WE sector topics, the topic related data
    and descriptive types of metadata.'
