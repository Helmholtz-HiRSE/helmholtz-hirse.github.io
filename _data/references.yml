  abstract: 'This document provides an analysis of practices to support FAIR data
    production within a broad selection of research disciplines and research data
    repositories. It aims to inform the priorities of stakeholders interested in embedding
    those practices in research communities. Those stakeholders include policy makers,
    data librarians and others providing data services to research communities, as
    well as champions of FAIR principles in those communities. It also identifies
    priority themes for initial work in FAIRsFAIR to support ESFRI cluster and EOSC
    projects in FAIR culture change. These include developing a self-assessment framework
    for research infrastructures and institutions on their progress to support FAIR
    enabling practices in the communities they serve. This will underpin further work
    to build capabilities, describe good practice and address the highly uneven awareness
    of FAIR principles and the lack of information on research community implementation.
    Though we can''t undertake to respond to every comment directly, we are seeking
    wide feedback on this deliverable which will inform discussions and further work
    within FAIRsFAIR as well as collaborations with other relevant projects. Comments
    and suggestions can be added at: https://docs.google.com/document/d/1xtFL21mlrI7YqzyNUnpRWz3uRqe0-EGocTStn_ctOGo/edit?pli=1#'
