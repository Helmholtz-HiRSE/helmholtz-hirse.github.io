  type: article
  authors:
  - Jürgen Streicher
  - Marlies Schütz
  - Clemens Blümel
  - Alexander Schniedermann
  title: 'Open Research Tools: Stand und Herausforderungen im Spannungsfeld von Forschungssoftware,
    Offenheit und digitaler Infrastruktur'
  year: 2025
  doi: 10.5281/ZENODO.15771943
  url: https://zenodo.org/doi/10.5281/zenodo.15771943
  abstract: Digital tools, software and related infrastructures are central to modern
    science and research. With regards to open science, open software tools are becoming
    increasingly important as they promote and support collaboration, reproducibility
    and access to resources. Researchers are actively contributing to the development
    of these ``Open Research Tools (ORT)'' and are thus helping to shape the digital
    transformation of the science system. This change is also noticeable in Germany,
    where the area of research software is gaining increasing importance. The aim
    of the study is to systematically review the state of research on ORT, analyse
    key topics and critically reflect on the situation in Germany. Current research
    findings, challenges and trends are highlighted, and the assessments of relevant
    actors and stakeholders are included in the analysis. An open conceptual understanding
    was chosen for the research and analyses in order to allow a flexible and explorative
    approach. In terms of methodology, the study is based on a scoping review of the
    relevant literature and expert interviews. The results were discussed, reflected
    upon and further developed in workshops. The aim was also to identify key challenges,
    opportunities and strategies for ORT in Germany and to derive recommendations.
