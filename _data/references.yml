- id: bobra_survey_2020
  type: article
  authors:
  - Monica G. Bobra
  - Stuart J. Mumford
  - Russell J. Hewett
  - Steven D. Christe
  - Kevin Reardon
  - Sabrina Savage
  - Jack Ireland
  - Tiago M. D. Pereira
  - Bin Chen
  - David Pérez-Suárez
  title: A Survey of Computational Tools in Solar Physics
  year: 2020
  journal: Solar Physics
  volume: '295'
  number: '4'
  pages: 57--57
  doi: 10.1007/s11207-020-01622-2
  abstract: 'The SunPy Project developed a 13-question survey to understand the software
    and hardware usage of the solar physics community. 364 members of the solar physics
    community, across 35 countries, responded to our survey. We found that 99±0.5%
    of respondents use software in their research and 66% use the Python scientific
    software stack. Students are twice as likely as faculty, staff scientists, and
    researchers to use Python rather than Interactive Data Language (IDL). In this
    respect, the astrophysics and solar physics communities differ widely: 78% of
    solar physics faculty, staff scientists, and researchers in our sample uses IDL,
    compared with 44% of astrophysics faculty and scientists sampled by Momcheva and
    Tollerud (2015). 63±4% of respondents have not taken any computer-science courses
    at an undergraduate or graduate level. We also found that most respondents utilize
    consumer hardware to run software for solar-physics research. Although 82% of
    respondents work with data from space-based or ground-based missions, some of
    which (e.g. the Solar Dynamics Observatory and Daniel K. Inouye Solar Telescope)
    produce terabytes of data a day, 14% use a regional or national cluster, 5% use
    a commercial cloud provider, and 29% use exclusively a laptop or desktop. Finally,
    we found that 73±4% of respondents cite scientific software in their research,
    although only 42±3% do so routinely.'
- id: gruenpeter_m215_2020
  type: article
  authors:
  - Morane Gruenpeter
  - Roberto Di Cosmo
  - Hylke Koers
  - Patricia Herterich
  - Rob Hooft
  - Jessica Parland-von Essen
  - Jonas Tana
  - Tero Aalto
  - Sarah Jones
  title: M2.15 Assessment report on 'FAIRness of software'
  year: 2020
  doi: 10.5281/zenodo.4095092
  url: https://zenodo.org/record/4095092#.YCHNkMIRXs0
  abstract: Software has an important place in academia and as such it has an important
    place in the FAIR ecosystem. Software can be used throughout the research process;
    however it can also be an outcome of the research process. Distinguishing between
    these different roles is essential for any assessment of the `FAIRness of software'.
    This is the first milestone of the FAIRsFAIR project focused specifically on software
    as a digital object. In this report we discuss the state-of-the-art of software
    in the scholarly ecosystem in general and in the FAIR literature in particular.
    We identify the challenges of different stakeholders when it comes to finding
    and reusing software. Furthermore, we present an analysis of nine resources that
    call for the recognition of software in academia and that present guidelines or
    recommendations to improve its status - either by becoming more FAIR or by improving
    the curation of software in general. With this analysis we demonstrate to what
    extent each of the FAIR principles is seen as relevant, achievable and measurable;
    and in what sense it benefits software artifacts. Finally, we present 10 high-level
    recommendations for organizations that seek to define FAIR principles or other
    requirements for research software in the scholarly domain. Feedback and suggestions
    will be most welcome as comments on the public Google Doc version of this report
