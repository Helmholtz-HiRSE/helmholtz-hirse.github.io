  - Thanassis Tiropanis
  title: From FAIR research data toward FAIR and open research software
  year: 2020
  journal: it - Information Technology
  volume: '62'
  number: '1'
  pages: 39--47
  doi: 10.1515/itit-2019-0040
  url: https://www.degruyter.com/document/doi/10.1515/itit-2019-0040/html?lang=en
  abstract: The Open Science agenda holds that science advances faster when we can
    build on existing results. Therefore, research data must be FAIR (Findable, Accessible,
    Interoperable, and Reusable) in order to advance the findability, reproducibility
    and reuse of research results. Besides the research data, all the processing steps
    on these data – as basis of scientific publications – have to be available, too.
    For good scientific practice, the resulting research software should be both open
    and adhere to the FAIR principles to allow full repeatability, reproducibility,
    and reuse. As compared to research data, research software should be both archived
    for reproducibility and actively maintained for reusability. The FAIR data principles
    do not require openness, but research software should be open source software.
    Established open source software licenses provide sufficient licensing options,
    such that it should be the rare exception to keep research software closed. We
    review and analyze the current state in this area in order to give recommendations
    for making research software FAIR and open.
