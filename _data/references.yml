  title: 'Seeking Enlightenment: Incorporating Evidence-Based Practice Techniques
    in a Research Software Engineering Team'
  year: 2023
  doi: 10.5281/ZENODO.10420969
  abstract: Evidence-based practice (EBP) in software engineering aims to improve
    decision-making in software development by complementing practitioners' professional
    judgment with high-quality evidence from research. We believe the use of EBP techniques
    may be helpful for research software engineers (RSEs) in their work to bring software
    engineering best practices to scientific software development. In this study,
    we present an experience report on the use of a particular EBP technique, rapid
    reviews, within an RSE team at Sandia National Laboratories, and present practical
    recommendations for how to address barriers to EBP adoption within the RSE community.
