  - Florian Rabe
  title: (Deep) FAIR mathematics
  year: 2020
  journal: it - Information Technology
  volume: '62'
  number: '1'
  pages: 7--17
  doi: 10.1515/itit-2019-0028
  url: https://www.degruyter.com/view/journals/itit/62/1/article-p7.xml
  abstract: class="abstract"\textlessh2 class="abstractTitle text-title my-1" id="d705e2"/h2
    this article, we analyze the state of research data in mathematics. We find that
    while the mathematical community embraces the notion of open data, the FAIR principles
    are not yet sufficiently realized. Indeed, we claim that the case of mathematical
    data is special, since the objects of interest are abstract (all properties can
    be known) and complex (they have a rich inner structure that must be represented).
    We present a novel classification of mathematical data and derive an extended
    set of FAIR requirements, which accomodate the special needs of math datasets.
    We summarize these as FAIR/strong. Finally, we show a prototypical system infrastructure,
    which can realize deep FAIRness for one category (tabular data) of mathematical
    datasets./p/section
