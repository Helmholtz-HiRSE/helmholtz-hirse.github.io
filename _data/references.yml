  title: Advancing Software Citation Implementation (Software Citation Workshop 2022)
  year: 2023
  doi: 10.48550/ARXIV.2302.07500
  abstract: Software is foundationally important to scientific and social progress,
    however, traditional acknowledgment of the use of others' work has not adapted
    in step with the rapid development and use of software in research. This report
    outlines a series of collaborative discussions that brought together an international
    group of stakeholders and experts representing many communities, forms of labor,
    and expertise. Participants addressed specific challenges about software citation
    that have so far gone unresolved. The discussions took place in summer 2022 both
    online and in-person and involved a total of 51 participants. The activities described
    in this paper were intended to identify and prioritize specific software citation
    problems, develop (potential) interventions, and lay out a series of mutually
    supporting approaches to address them. The outcomes of this report will be useful
    for the GLAM (Galleries, Libraries, Archives, Museums) community, repository managers
    and curators, research software developers, and publishers.
