- id: lannelongue_green_2021
  type: article
  authors:
  - Loïc Lannelongue
  - Jason Grealey
  - Michael Inouye
  title: 'Green Algorithms: Quantifying the Carbon Footprint of Computation'
  year: 2021
  journal: Advanced Science
  volume: '8'
  number: '12'
  pages: '2100707'
  doi: 10.1002/advs.202100707
  url: https://onlinelibrary.wiley.com/doi/10.1002/advs.202100707
  abstract: Abstract Climate change is profoundly affecting nearly all aspects of
    life on earth, including human societies, economies, and health. Various human
    activities are responsible for significant greenhouse gas (GHG) emissions, including
    data centers and other sources of large-scale computation. Although many important
    scientific milestones are achieved thanks to the development of high-performance
    computing, the resultant environmental impact is underappreciated. In this work,
    a methodological framework to estimate the carbon footprint of any computational
    task in a standardized and reliable way is presented and metrics to contextualize
    GHG emissions are defined. A freely available online tool, Green Algorithms (
    www.green-algorithms.org ) is developed, which enables a user to estimate and
    report the carbon footprint of their computation. The tool easily integrates with
    computational processes as it requires minimal information and does not interfere
    with existing code, while also accounting for a broad range of hardware configurations.
    Finally, the GHG emissions of algorithms used for particle physics simulations,
    weather forecasts, and natural language processing are quantified. Taken together,
    this study develops a simple generalizable framework and freely available tool
    to quantify the carbon footprint of nearly any computation. Combined with recommendations
    to minimize unnecessary CO 2 emissions, the authors hope to raise awareness and
    facilitate greener computation.
