  - for FAIR4RS Subgroup 1
  title: A Fresh Look at FAIR for Research Software
  year: 2021
  url: https://arxiv.org/abs/2101.10883v3
  abstract: This document captures the discussion and deliberation of the FAIR for
    Research Software (FAIR4RS) subgroup that took a fresh look at the applicability
    of the FAIR Guiding Principles for scientific data management and stewardship
    for research software. We discuss the vision of research software as ideally reproducible,
    open, usable, recognized, sustained and robust, and then review both the characteristic
    and practiced differences of research software and data. This vision and understanding
    of initial conditions serves as a backdrop for an attempt at translating and interpreting
    the guiding principles to more fully align with research software. We have found
    that many of the principles remained relatively intact as written, as long as
    considerable interpretation was provided. This was particularly the case for the
    "Findable" and "Accessible" foundational principles. We found that "Interoperability"
    and "Reusability" are particularly prone to a broad and sometimes opposing set
    of interpretations as written. We propose two new principles modeled on existing
    ones, and provide modified guiding text for these principles to help clarify our
    final interpretation. A series of gaps in translation were captured during this
    process, and these remain to be addressed. We finish with a consideration of where
    these translated principles fall short of the vision laid out in the opening.
