- id: hasselbring_fair_2019
  type: article
  authors:
  - Wilhelm Hasselbring
  - Leslie Carr
  - Simon Hettrick
  - Heather Packer
  - Thanassis Tiropanis
  title: FAIR and Open Computer Science Research Software
  year: 2019
  abstract: In computational science and in computer science, research software is
    a central asset for research. Computational science is the application of computer
    science and software engineering principles to solving scientific problems, whereas
    computer science is the study of computer hardware and software design. The Open
    Science agenda holds that science advances faster when we can build on existing
    results. Therefore, research software has to be reusable for advancing science.
    Thus, we need proper research software engineering for obtaining reusable and
    sustainable research software. This way, software engineering methods may improve
    research in other disciplines. However, research in software engineering and computer
    science itself will also benefit from reuse when research software is involved.
    For good scientific practice, the resulting research software should be open and
    adhere to the FAIR principles (findable, accessible, interoperable and repeatable)
    to allow repeatability, reproducibility, and reuse. Compared to research data,
    research software should be both archived for reproducibility and actively maintained
    for reusability. The FAIR data principles do not require openness, but research
    software should be open source software. Established open source software licenses
    provide sufficient licensing options, such that it should be the rare exception
    to keep research software closed. We review and analyze the current state in this
    area in order to give recommendations for making computer science research software
    FAIR and open. We observe that research software publishing practices in computer
    science and in computational science show significant differences.
- id: grange_struggle_2019
  type: article
  authors:
  - Y. G. Grange
  - T. Jürges
  - T. J. Dijkema
  - R. Halfwerk
  - G. W. Schoonderbeek
  title: (the struggle) Towards an open source policy
  year: 2019
  url: http://arxiv.org/abs/1911.00534v1
  abstract: Public availability and tracability of results from publically-funded
    work is a topic that gets more and more attention from funding agencies and scientific
    policy makers. However, most policies focus on data as the output of research.
    In this contribution, we focus on research software and we introduce the ASTRON
    Open Source Policy. Apart from the license used (Apache 2.0), the policy is written
    as a manual that explains how to license software, when to assign a Digital Object
    Identifier (DOI), and defines that all code should be put in an ASTRON managed
    repository. The policy has been made publically available, a DOI has been assigned
    to it and it has been put in a repository to stimulate the ADASS community to
    start a conversation on how to make our code publically accessible and citable.
