- id: fernandez_open_2019
  type: article
  authors:
  - Daniel Méndez Fernández
  - Daniel Graziotin
  - Stefan Wagner
  - Heidi Seibold
  title: Open Science in Software Engineering
  year: 2019
  abstract: Open science describes the movement of making any research artefact available
    to the public and includes, but is not limited to, open access, open data, or
    open source. While open science is becoming generally accepted as a norm in other
    scientific disciplines, in software engineering, we are still struggling in adapting
    open science to the particularities of our discipline, rendering progress in our
    scientific community cumbersome. In this chapter, we will reflect upon the essentials
    of open science for software engineering including what open science is, why we
    should engage in it, and how we should do it. We particularly draw from our experiences
    in chairing roles implementing open science initiatives and researchers engaging
    in open science to critically discuss challenges and pitfalls, and to address
    more advanced topics such as how and under which conditions to share preprints,
    what infrastructure and licence model to cover, or how do it within the limitations
    of different reviewing models, such as double-blind reviewing. Our hope is to
    help establishing a common ground and to contribute to make open science a norm
    also in software engineering.
