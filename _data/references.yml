  abstract: The shared values between free and open source software (FOSS) and those
    of the academic community have led to increasing adoption of FOSS projects by
    researchers and instructors in computing fields. Many papers have been written
    evaluating the pedagogical value of individual FOSS projects and FOSS as a whole.
    More recently the scholarly value of FOSS has also been explored. This paper bridges
    the conversations on the scholarly and pedagogical merits of FOSS development
    and identifies the value of FOSS to helping computing departments in small and
    regional colleges and universities better support the mission of their institution.
