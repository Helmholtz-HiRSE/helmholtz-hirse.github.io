  abstract: The Australian National Data Service (ANDS) has been funded by the Australian
    Government since 2009, with a goal to increase the value of data to researchers,
    research institutions and the nation. To achieve this goal, ANDS has funded more
    than 200 projects under seven programs. This paper provides an overview of one
    of these programs, the Applications Program, which focused on funding software
    infrastructure to enable data reuse to demonstrate the value of making data available
    to researchers. The paper also presents some representative projects, a summary
    of what the program has achieved, and lessons learned.
