name: Scholar Alerts to BibTeX

# Runs every Monday and checks a Gmail mailbox for unread emails in the
# configured label (default: "RSE").  Any DOIs or arXiv IDs found in those
# emails are added to _bibliography/rse_publications.bib and a pull request
# is opened automatically.
#
# Required repository secrets:
#   GMAIL_ADDRESS       – Gmail address that receives the Scholar alerts.
#   GMAIL_APP_PASSWORD  – App Password for that account (Settings → Security
#                         → 2-Step Verification → App Passwords).
#
# Optional repository variable (or secret):
#   GMAIL_LABEL         – Gmail label to check (default: RSE).

on:
  schedule:
    - cron: '0 9 * * 1'   # Every Monday at 09:00 UTC
  workflow_dispatch:       # Allow manual runs from the Actions tab

jobs:
  scholar_alerts:
    name: Import Scholar alert emails into bibliography
    runs-on: ubuntu-latest

    permissions:
      contents: write        # push the bib-update branch
      pull-requests: write   # open the PR

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r bin/requirements.txt

      - name: Fetch Scholar alert emails
        id: fetch_emails
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_LABEL: ${{ vars.GMAIL_LABEL || 'RSE' }}
        run: |
          python bin/fetch_scholar_alerts.py > /tmp/scholar_text.txt 2>/tmp/fetch_log.txt || true
          cat /tmp/fetch_log.txt >&2
          # Count non-empty output lines to decide whether to proceed
          LINE_COUNT=$(grep -c '[^[:space:]]' /tmp/scholar_text.txt || true)
          echo "line_count=${LINE_COUNT}" >> "$GITHUB_OUTPUT"

      - name: Run bibbot
        id: bibbot
        if: steps.fetch_emails.outputs.line_count != '0'
        run: |
          python bin/doi_to_bib.py \
            --input "$(cat /tmp/scholar_text.txt)" \
            > /tmp/bibbot_comment.txt 2>/tmp/bibbot_log.txt || true
          cat /tmp/bibbot_log.txt >&2
          {
            echo 'COMMENT<<BIBBOT_EOF'
            cat /tmp/bibbot_comment.txt
            echo 'BIBBOT_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Tidy BibTeX file
        if: steps.fetch_emails.outputs.line_count != '0'
        run: npx --yes bibtex-tidy@1.14.0 _bibliography/rse_publications.bib --modify --quiet --sort=special,-year,key

      - name: Create pull request
        id: create_pr
        if: steps.fetch_emails.outputs.line_count != '0'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "bib: add references from Scholar alerts (${{ github.run_id }})"
          title: "Add references from Scholar alerts"
          body: |
            Automated bibliography update from Google Scholar alert emails
            (label: **${{ vars.GMAIL_LABEL || 'RSE' }}**).

            ${{ steps.bibbot.outputs.COMMENT }}

            ---
            *Generated by the [scholar_alerts workflow](.github/workflows/scholar_alerts.yml)
            — run [`${{ github.run_id }}`](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).*
          branch: "bib/scholar-alerts"
          branch-suffix: short-commit-hash
          labels: bibliography
