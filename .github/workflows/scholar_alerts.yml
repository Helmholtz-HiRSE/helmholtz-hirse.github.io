name: Scholar Alerts to BibTeX

# Runs every Monday and checks a Gmail mailbox for unread emails in the
# configured label (default: "RSE").  For each DOI or arXiv ID found in
# those emails a separate pull request is opened so that maintainers can
# merge or close articles individually.
#
# Required repository secrets:
#   GMAIL_ADDRESS       – Gmail address that receives the Scholar alerts.
#   GMAIL_APP_PASSWORD  – App Password for that account (Settings → Security
#                         → 2-Step Verification → App Passwords).
#
# Optional repository variable:
#   GMAIL_LABEL         – Gmail label to check (default: RSE).

on:
  schedule:
    - cron: '0 9 * * 1'   # Every Monday at 09:00 UTC
  workflow_dispatch:       # Allow manual runs from the Actions tab

jobs:
  scholar_alerts:
    name: Create one PR per article from Scholar alert emails
    runs-on: ubuntu-latest

    permissions:
      contents: write        # push per-article branches
      pull-requests: write   # open the PRs

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r bin/requirements.txt

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch Scholar alert emails
        id: fetch_emails
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_LABEL: ${{ vars.GMAIL_LABEL || 'RSE' }}
        run: |
          python bin/fetch_scholar_alerts.py > /tmp/scholar_text.txt 2>/tmp/fetch_log.txt || true
          cat /tmp/fetch_log.txt >&2
          LINE_COUNT=$(grep -c '[^[:space:]]' /tmp/scholar_text.txt || true)
          echo "line_count=${LINE_COUNT}" >> "$GITHUB_OUTPUT"

      - name: Extract identifiers
        id: extract
        if: steps.fetch_emails.outputs.line_count != '0'
        run: |
          python - <<'PY'
          import importlib.util, sys

          spec = importlib.util.spec_from_file_location('doi_to_bib', 'bin/doi_to_bib.py')
          mod = importlib.util.module_from_spec(spec)
          spec.loader.exec_module(mod)

          with open('/tmp/scholar_text.txt', encoding='utf-8') as f:
              text = f.read()

          identifiers = mod.extract_identifiers(text)
          if not identifiers:
              sys.exit(0)

          lines = []
          for kind, val in identifiers:
              if kind == 'doi':
                  lines.append(f'https://doi.org/{val}')
              else:
                  lines.append(f'https://arxiv.org/abs/{val}')

          with open('/tmp/identifiers.txt', 'w', encoding='utf-8') as f:
              f.write('\n'.join(lines) + '\n')

          print(f'Found {len(identifiers)} identifier(s).')
          PY

          if [ -f /tmp/identifiers.txt ]; then
            COUNT=$(wc -l < /tmp/identifiers.txt | tr -d ' ')
            echo "count=${COUNT}" >> "$GITHUB_OUTPUT"
          else
            echo "count=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Create one PR per article
        if: steps.extract.outputs.count != '0' && steps.extract.outputs.count != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          MAIN_BRANCH=$(git rev-parse --abbrev-ref HEAD)
          CREATED=0
          SKIPPED=0

          while IFS= read -r identifier; do
            [ -z "$identifier" ] && continue
            echo "--- Processing: $identifier"

            # Reset tracked files to the base branch state before each attempt
            git checkout "$MAIN_BRANCH" -- _bibliography/rse_publications.bib

            # Run bibbot for this single identifier
            python bin/doi_to_bib.py --input "$identifier" \
              > /tmp/bibbot_out.txt 2>/tmp/bibbot_err.txt || true
            cat /tmp/bibbot_err.txt >&2

            # Skip if the bib file is unchanged (already exists or fetch failed)
            if git diff --quiet _bibliography/rse_publications.bib; then
              echo "  → No new entry for $identifier — already in bibliography or fetch failed, skipping."
              SKIPPED=$((SKIPPED + 1))
              continue
            fi

            # Tidy the bib file
            npx --yes bibtex-tidy@1.14.0 _bibliography/rse_publications.bib \
              --modify --quiet --sort=special,-year,key

            # Build a branch name that is safe and human-readable
            SAFE_ID=$(echo "$identifier" \
              | sed 's|https://doi\.org/||; s|https://arxiv\.org/abs/|arxiv-|' \
              | sed 's|[^a-zA-Z0-9._-]|-|g' | tr '[:upper:]' '[:lower:]' | cut -c1-60)
            BRANCH="bib/scholar-${SAFE_ID}"

            # Skip if an open PR already targets this branch (previous run)
            if gh pr list --head "$BRANCH" --state open --json number \
                --jq '.[0].number' 2>/dev/null | grep -q '^[0-9]'; then
              echo "  → Open PR already exists for $BRANCH, skipping."
              SKIPPED=$((SKIPPED + 1))
              continue
            fi

            # Human-readable identifier for commit / PR title
            DISPLAY_ID=$(echo "$identifier" \
              | sed 's|https://doi\.org/||; s|https://arxiv\.org/abs/|arXiv:|')

            # Create (or reset) the branch, commit, push
            git checkout -B "$BRANCH"
            git add _bibliography/rse_publications.bib
            git commit -m "bib: add ${DISPLAY_ID} from Scholar alert"
            git push --force-with-lease origin "$BRANCH"

            # Write PR body to a file to avoid quoting issues
            RUN_ID="${{ github.run_id }}"
            cat > /tmp/pr_body.md << EOF
          Automated bibliography update from Google Scholar alert email.

          $(cat /tmp/bibbot_out.txt)

          ---
          *Generated by the [scholar_alerts workflow](.github/workflows/scholar_alerts.yml) — run [#${RUN_ID}](${RUN_URL}).*
          EOF

            gh pr create \
              --title "Add reference: ${DISPLAY_ID}" \
              --body-file /tmp/pr_body.md \
              --label bibliography \
              --base "$MAIN_BRANCH"

            git checkout "$MAIN_BRANCH"
            CREATED=$((CREATED + 1))
          done < /tmp/identifiers.txt

          echo ""
          echo "Summary: created ${CREATED} PR(s), skipped ${SKIPPED}."
