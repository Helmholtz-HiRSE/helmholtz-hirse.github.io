name: Deploy GitHub Pages

# Deploys the Jekyll site to GitHub Pages on every push to main.
# The _data/references.yml file is generated from the BibTeX source during
# deployment, so _bibliography/rse_publications.bib is the single source of
# truth.  The generated YAML is never committed to the repository.
#
# Prerequisites:
#   Go to Settings → Pages and set the source to "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; cancel any in-progress run.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r bin/requirements.txt

      - name: Generate references YAML
        run: python bin/generate_references.py

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build the site with Jekyll
        run: bundle exec jekyll build --future
        env:
          JEKYLL_ENV: production

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
