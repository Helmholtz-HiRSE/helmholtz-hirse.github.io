name: DOI/arXiv to BibTeX

# Triggered when a maintainer applies the "add-to-bib" label to an issue.
# The issue body should contain DOIs and/or arXiv IDs (see the issue template).

on:
  issues:
    types: [labeled]

jobs:
  add_to_bib:
    name: Add references to rse_publications.bib
    runs-on: ubuntu-latest
    # Only run when the label that was just added is "add-to-bib"
    if: github.event.label.name == 'add-to-bib'

    permissions:
      contents: write        # needed to push the bib-update branch
      pull-requests: write   # needed to open the PR
      issues: write          # needed to post the comment

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r bin/requirements.txt

      - name: Run bibbot
        id: bibbot
        run: |
          python bin/doi_to_bib.py \
            --input "${{ github.event.issue.body }}" \
            > /tmp/bibbot_comment.txt 2>/tmp/bibbot_log.txt || true
          cat /tmp/bibbot_log.txt >&2
          {
            echo 'COMMENT<<BIBBOT_EOF'
            cat /tmp/bibbot_comment.txt
            echo 'BIBBOT_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Tidy BibTeX file
        run: npx --yes bibtex-tidy@1.14.0 _bibliography/rse_publications.bib --modify --quiet --sort=special,-year,key

      - name: Create pull request
        id: create_pr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "bib: add references from issue #${{ github.event.issue.number }}"
          title: "Add references from issue #${{ github.event.issue.number }}"
          body: |
            Automated bibliography update triggered by issue #${{ github.event.issue.number }}.

            Closes #${{ github.event.issue.number }}

            ---
            *Generated by the [doi_to_bib workflow](.github/workflows/doi_to_bib.yml).*
          branch: "bib/issue-${{ github.event.issue.number }}"
          branch-suffix: short-commit-hash
          labels: bibliography

      - name: Comment on issue
        uses: actions/github-script@v7
        if: always()
        env:
          COMMENT: ${{ steps.bibbot.outputs.COMMENT }}
          PR_URL: ${{ steps.create_pr.outputs.pull-request-url }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            let body = process.env.COMMENT || '_bibbot produced no output._';
            const prUrl = process.env.PR_URL;
            if (prUrl) {
              body += `\n\n🔗 Pull request: ${prUrl}`;
            }
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body,
            });
